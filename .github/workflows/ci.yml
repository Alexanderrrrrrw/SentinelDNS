name: ci

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo check
        run: cargo check --workspace
      - name: Cargo test
        run: cargo test --workspace
      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Cargo audit
        run: cargo audit
      - name: Cargo deny
        run: cargo deny check

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Verify dependency policy
        run: node scripts/verify-js-dependencies.mjs
      - name: Install
        run: corepack pnpm install --frozen-lockfile
      - name: Lint
        run: corepack pnpm --filter sentinel-dashboard lint
      - name: Test
        run: corepack pnpm --filter sentinel-dashboard test
      - name: Build
        run: corepack pnpm --filter sentinel-dashboard build
